{% extends "base.html" %}
{% block title %}تم التعيين — الطبيب الحافظ{% endblock %}
{% block content %}
<div class="min-h-screen flex">
    <div class="flex-1 flex items-center justify-center px-8 py-16 bg-white">
        <div class="w-full max-w-md text-center">
            <div class="w-20 h-20 mx-auto mb-6 bg-green-100 rounded-full flex items-center justify-center">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h1 class="text-3xl font-black text-gray-800 mb-4">تم تعيين كلمة المرور</h1>
            <p class="text-gray-500 leading-relaxed mb-8">
                تم تغيير كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول باستخدام كلمة المرور الجديدة.
            </p>
            <a href="{% url 'accounts:login' %}" class="inline-block py-3 px-8 bg-gradient-to-l from-primary-600 to-primary-700 text-white font-bold rounded-xl hover:from-primary-700 hover:to-primary-800 transition-all shadow-md shadow-primary-500/25">
                تسجيل الدخول
            </a>
        </div>
    </div>
</div>
{% endblock %}
