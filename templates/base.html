{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}الطبيب الحافظ{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Tajawal', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        .htmx-swapping { opacity: 0; transition: opacity 200ms ease-out; }
        .htmx-added { animation: fadeIn 300ms ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px rgba(255,255,255,0) inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        function apiFetch(url, options = {}) {
            const headers = new Headers(options.headers || {});
            if (!headers.has('X-CSRFToken')) {
                headers.set('X-CSRFToken', getCookie('csrftoken'));
            }
            if (!headers.has('X-Requested-With')) {
                headers.set('X-Requested-With', 'XMLHttpRequest');
            }
            return fetch(url, {
                credentials: 'same-origin',
                ...options,
                headers,
            });
        }
    </script>
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.store('notifications', {
            unreadCount: {{ unread_count|default:0 }},
            ws: null,
            connected: false,
            connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const url = `${protocol}//${window.location.host}/ws/notifications/`;
                try {
                    this.ws = new WebSocket(url);
                    this.ws.onopen = () => { this.connected = true; };
                    this.ws.onclose = () => {
                        this.connected = false;
                        setTimeout(() => this.connect(), 5000);
                    };
                    this.ws.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        if (data.type === 'new_notification') {
                            this.unreadCount = data.unread_count || this.unreadCount + 1;
                            window.dispatchEvent(new CustomEvent('showToast', {
                                detail: { message: '🔔 ' + data.title, type: 'success' }
                            }));
                        } else if (data.type === 'unread_count_update') {
                            this.unreadCount = data.unread_count;
                        }
                    };
                } catch(e) {}
            }
        });
        Alpine.store('notifications').connect();
    });
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
