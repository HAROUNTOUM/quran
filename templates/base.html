    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        function apiFetch(url, options = {}) {
            const headers = new Headers(options.headers || {});
            if (!headers.has('X-CSRFToken')) {
                headers.set('X-CSRFToken', getCookie('csrftoken'));
            }
            if (!headers.has('X-Requested-With')) {
                headers.set('X-Requested-With', 'XMLHttpRequest');
            }
            return fetch(url, {
                credentials: 'same-origin',
                ...options,
                headers,
            });
        }
    </script>

    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.store('notifications', {
            unreadCount: {{ unread_count|default:0 }},
            ws: null,
            connected: false,
            connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const url = `${protocol}//${window.location.host}/ws/notifications/`;
                try {
                    this.ws = new WebSocket(url);
                    this.ws.onopen = () => { this.connected = true; };
                    this.ws.onclose = () => {
                        this.connected = false;
                        setTimeout(() => this.connect(), 5000);
                    };
                    this.ws.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        if (data.type === 'new_notification') {
                            this.unreadCount = data.unread_count || this.unreadCount + 1;
                            window.dispatchEvent(new CustomEvent('showToast', {
                                detail: { message: '🔔 ' + data.title, type: 'success' }
                            }));
                        } else if (data.type === 'unread_count_update') {
                            this.unreadCount = data.unread_count;
                        }
                    };
                } catch(e) {}
            }
        });
        Alpine.store('notifications').connect();
    });
