{% extends "dashboard/base.html" %}
{% block page_title %}تعديل {{ exam.title }}{% endblock %}
{% block page_heading %}{{ exam.title }}{% endblock %}
{% block page_breadcrumb %}الرئيسية / <a href="{% url 'accounts:admin_exam_list' %}">الامتحانات</a> / تعديل{% endblock %}
{% block dashboard_content %}

<div class="max-w-2xl">
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">عنوان الامتحان *</label>
                    <input type="text" name="title" value="{{ exam.title }}" required maxlength="255"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">الوصف</label>
                    <textarea name="description" rows="3"
                              class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">{{ exam.description }}</textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">نوع الامتحان</label>
                        <select name="exam_type"
                                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">
                            {% for t, label in exam.EXAM_TYPES %}
                            <option value="{{ t }}" {% if exam.exam_type == t %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">تاريخ الامتحان</label>
                        <input type="date" name="exam_date" value="{{ exam.exam_date|date:'Y-m-d' }}"
                               class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">الحلقة</label>
                        <select name="circle"
                                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">
                            <option value="">— عام (بدون حلقة) —</option>
                            {% for circle in circles %}
                            <option value="{{ circle.pk }}" {% if exam.circle_id == circle.pk %}selected{% endif %}>{{ circle.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">المعلم المسند</label>
                        <select name="assigned_teacher"
                                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">
                            <option value="">— اختر معلمًا —</option>
                            {% for teacher in teachers %}
                            <option value="{{ teacher.pk }}" {% if exam.assigned_teacher_id == teacher.pk %}selected{% endif %}>{{ teacher.full_name_ar }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">الدرجة القصوى</label>
                        <input type="number" name="max_marks" value="{{ exam.max_marks }}" min="1" step="0.5"
                               class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">نسبة النجاح (%)</label>
                        <input type="number" name="pass_percentage" value="{{ exam.pass_percentage }}" min="0" max="100"
                               class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <button type="submit"
                        class="flex-1 px-6 py-3 bg-primary-600 text-white font-medium rounded-xl hover:bg-primary-700 transition-colors shadow-md shadow-primary-500/25">
                    حفظ التعديلات
                </button>
                <a href="{% url 'accounts:admin_exam_detail' exam.pk %}"
                   class="px-6 py-3 bg-gray-100 text-gray-600 font-medium rounded-xl hover:bg-gray-200 transition-colors text-center">
                    إلغاء
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
