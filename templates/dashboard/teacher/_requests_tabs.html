{% comment %}
Teacher requests workspace tabs — review/recitation, reschedule, and support
requests as one inbox (links to existing URLs; no view change).
{% endcomment %}
<nav class="flex items-center gap-1 mb-6 border-b border-gray-100 overflow-x-auto" dir="rtl" aria-label="أقسام الطلبات">
    {% with active=request.resolver_match.url_name %}
    <a href="{% url 'accounts:teacher_review_requests' %}"
       class="whitespace-nowrap px-4 py-2.5 text-sm font-medium border-b-2 transition-colors {% if active == 'teacher_review_requests' %}border-primary-600 text-primary-600{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
        التسميع والأسئلة
    </a>
    <a href="{% url 'accounts:teacher_private_sessions' %}"
       class="whitespace-nowrap px-4 py-2.5 text-sm font-medium border-b-2 transition-colors {% if active == 'teacher_private_sessions' %}border-primary-600 text-primary-600{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
        الجلسات الخاصة
    </a>
    <a href="{% url 'accounts:teacher_reschedule_requests' %}"
       class="whitespace-nowrap px-4 py-2.5 text-sm font-medium border-b-2 transition-colors {% if active == 'teacher_reschedule_requests' %}border-primary-600 text-primary-600{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
        تعديل المواعيد
    </a>
    <a href="{% url 'accounts:teacher_requests' %}"
       class="whitespace-nowrap px-4 py-2.5 text-sm font-medium border-b-2 transition-colors {% if active == 'teacher_requests' %}border-primary-600 text-primary-600{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300{% endif %}">
        الدعم والبلاغات
    </a>
    {% endwith %}
</nav>
