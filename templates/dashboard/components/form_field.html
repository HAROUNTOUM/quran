<div class="mb-4">
    {% if label %}<label class="block text-sm font-medium text-gray-700 mb-1.5">{{ label }}{% if required %}<span class="text-red-500 mr-0.5">*</span>{% endif %}</label>{% endif %}
    {{ field }}
    {% if help_text %}<p class="text-xs text-gray-400 mt-1">{{ help_text }}</p>{% endif %}
    {% if errors %}
    <div class="mt-1">
        {% for error in errors %}
        <p class="text-xs text-red-500">{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}
</div>
