<div x-data="{ open: false, loading: false, content: '' }"
     @open-drawer.window="open = true; loading = true;
        fetch($event.detail.url).then(r=>r.text()).then(h=>{ content = h; loading = false; }).catch(()=>{ loading = false; content = '<div class=\'p-6 text-center text-sm text-red-500\'>عذراً، حدث خطأ في تحميل المحتوى</div>'; });
        $event.detail.onOpen && $event.detail.onOpen();"
     x-show="open" x-cloak
     class="fixed inset-0 z-[90]" @keydown.escape.window="open = false">
    <div class="absolute inset-0 bg-black/30" @click="open = false"></div>
    <div x-show="open"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-x-full"
         x-transition:enter-end="opacity-100 translate-x-0"
         class="absolute top-0 left-0 h-full w-full max-w-lg bg-white shadow-2xl overflow-y-auto z-10">
        <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-3 flex items-center justify-between z-10">
            <h3 class="text-sm font-bold text-gray-800">{{ title|default:'التفاصيل' }}</h3>
            <button @click="open = false" class="p-1.5 hover:bg-gray-100 rounded-lg transition-colors">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="p-5" x-show="!loading" x-html="content"></div>
        <div class="p-5" x-show="loading">
            {% include "dashboard/components/skeleton.html" with lines=6 %}
        </div>
    </div>
</div>
