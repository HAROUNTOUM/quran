<header class="bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between sticky top-0 z-30">
    <div class="flex items-center gap-4">
        <button @click="toggleSidebar()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
            <h2 class="text-lg font-bold text-gray-800">{% block page_heading %}نظرة عامة{% endblock %}</h2>
            <p class="text-xs text-gray-400">{% block page_breadcrumb %}الرئيسية{% endblock %}</p>
        </div>
    </div>

    <div class="flex items-center gap-4">
        <div class="relative" x-data="{ open: false }">
            <input type="text" placeholder="بحث سريع..."
                   @focus="open = true" @blur="setTimeout(() => open = false, 200)"
                   class="w-64 px-4 py-2 pr-10 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            <svg class="w-4 h-4 text-gray-400 absolute right-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>

        <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="relative p-2 hover:bg-gray-100 rounded-xl transition-colors">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                {% if unread_count > 0 %}
                <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">{{ unread_count }}</span>
                {% endif %}
            </button>
            <div x-show="open" x-cloak @click.outside="open = false"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 -translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 class="absolute left-0 top-full mt-2 w-80 bg-white rounded-2xl shadow-2xl border border-gray-100 z-50 overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                    <span class="font-bold text-sm">الإشعارات</span>
                </div>
                <div class="max-h-80 overflow-y-auto" hx-get="{% url 'accounts:notification_list' %}" hx-trigger="load" hx-swap="innerHTML">
                    <p class="p-6 text-center text-sm text-gray-400">جاري التحميل...</p>
                </div>
            </div>
        </div>

        <a href="{% url 'accounts:profile' %}" class="w-9 h-9 bg-primary-100 rounded-full flex items-center justify-center cursor-pointer hover:bg-primary-200 transition-colors" title="ملفي الشخصي">
            <span class="text-primary-700 font-bold text-sm">{{ request.user.full_name_ar.0 }}</span>
        </a>
    </div>
</header>
