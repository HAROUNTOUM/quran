{% comment %}Workspace sub-nav: التواصل — requests, announcements, and notifications.{% endcomment %}
{% with vn=request.resolver_match.view_name %}
<div class="flex items-center gap-8 mb-6 border-b-2 border-[#E4EBE9] overflow-x-auto" dir="rtl">
    <a href="{% url 'accounts:admin_requests' %}"
       class="whitespace-nowrap px-1 py-3 text-[15px] font-bold border-b-[3px] -mb-[2px] transition-colors {% if vn == 'accounts:admin_requests' %}border-accent-500 text-navy-600{% else %}border-transparent text-[#9AB4BC] hover:text-navy-500{% endif %}">الطلبات والبلاغات</a>
    <a href="{% url 'accounts:admin_announcements' %}"
       class="whitespace-nowrap px-1 py-3 text-[15px] font-bold border-b-[3px] -mb-[2px] transition-colors {% if vn == 'accounts:admin_announcements' %}border-accent-500 text-navy-600{% else %}border-transparent text-[#9AB4BC] hover:text-navy-500{% endif %}">الإعلانات</a>
    <a href="{% url 'accounts:admin_notifications' %}"
       class="whitespace-nowrap px-1 py-3 text-[15px] font-bold border-b-[3px] -mb-[2px] transition-colors {% if vn == 'accounts:admin_notifications' %}border-accent-500 text-navy-600{% else %}border-transparent text-[#9AB4BC] hover:text-navy-500{% endif %}">الإشعارات</a>
</div>
{% endwith %}
