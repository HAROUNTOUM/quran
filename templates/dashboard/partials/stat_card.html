{% if filter_url %}
<a href="{{ filter_url }}" class="block bg-white rounded-2xl border {% if is_active %}border-primary-300 ring-2 ring-primary-200{% else %}border-gray-100{% endif %} p-6 hover:shadow-md hover:border-primary-200 transition-all group">
{% else %}
<div class="bg-white rounded-2xl border border-gray-100 p-6 hover:shadow-md transition-shadow">
{% endif %}
    <div class="flex items-center justify-between">
        <div>
            <p class="text-sm text-gray-400 mb-1">{{ label }}</p>
            <p class="text-3xl font-black {% if color == 'blue' %}text-primary-700{% elif color == 'green' %}text-green-600{% elif color == 'purple' %}text-purple-600{% elif color == 'amber' %}text-amber-600{% elif color == 'red' %}text-red-600{% endif %}">{{ value }}</p>
        </div>
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center {% if color == 'blue' %}bg-primary-50{% elif color == 'green' %}bg-green-50{% elif color == 'purple' %}bg-purple-50{% elif color == 'amber' %}bg-amber-50{% elif color == 'red' %}bg-red-50{% endif %}">
            {% if icon == 'students' %}
                <svg class="w-6 h-6 {% if color == 'blue' %}text-primary-600{% elif color == 'green' %}text-green-600{% elif color == 'purple' %}text-purple-600{% elif color == 'amber' %}text-amber-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            {% elif icon == 'circles' %}
                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            {% elif icon == 'teachers' %}
                <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            {% elif icon == 'attendance' %}
                <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
            {% elif icon == 'requests' %}
                <svg class="w-6 h-6 {% if color == 'red' %}text-red-600{% else %}text-primary-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            {% endif %}
        </div>
    </div>
{% if filter_url %}
</a>
{% else %}
</div>
{% endif %}
