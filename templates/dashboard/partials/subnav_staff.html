{% comment %}Workspace sub-nav: الأساتذة — teacher list, absences, and substitutions.
sidebar entry. Active state via request.resolver_match.view_name.{% endcomment %}
{% with vn=request.resolver_match.view_name %}
<div class="flex items-center gap-8 mb-6 border-b-2 border-[#E4EBE9] overflow-x-auto" dir="rtl">
    <a href="{% url 'accounts:admin_teachers' %}"
       class="whitespace-nowrap px-1 py-3 text-[15px] font-bold border-b-[3px] -mb-[2px] transition-colors {% if vn == 'accounts:admin_teachers' %}border-accent-500 text-navy-600{% else %}border-transparent text-[#9AB4BC] hover:text-navy-500{% endif %}">قائمة الأساتذة</a>
    <a href="{% url 'accounts:admin_teacher_absences' %}"
       class="whitespace-nowrap px-1 py-3 text-[15px] font-bold border-b-[3px] -mb-[2px] transition-colors {% if vn == 'accounts:admin_teacher_absences' %}border-accent-500 text-navy-600{% else %}border-transparent text-[#9AB4BC] hover:text-navy-500{% endif %}">طلبات الغياب</a>
    <a href="{% url 'accounts:admin_active_substitutions' %}"
       class="whitespace-nowrap px-1 py-3 text-[15px] font-bold border-b-[3px] -mb-[2px] transition-colors {% if vn == 'accounts:admin_active_substitutions' %}border-accent-500 text-navy-600{% else %}border-transparent text-[#9AB4BC] hover:text-navy-500{% endif %}">التعويضات النشطة</a>
</div>
{% endwith %}
