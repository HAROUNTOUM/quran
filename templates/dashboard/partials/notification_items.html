{% for n in notifications %}
<a href="{% url 'accounts:notification_mark_read' n.id %}"
   class="flex items-start gap-3 px-4 py-3 hover:bg-gray-50 transition-colors {% if not n.is_read %}bg-primary-50/50{% endif %} border-b border-gray-50 last:border-b-0">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0
        {% if n.type == 'approval' %}bg-green-50
        {% elif n.type == 'rejection' %}bg-red-50
        {% elif n.type == 'new_user' %}bg-blue-50
        {% elif n.type == 'new_request' %}bg-amber-50
        {% elif n.type == 'announcement' %}bg-purple-50
        {% else %}bg-gray-50{% endif %}">
        {% if n.type == 'approval' %}
        <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {% elif n.type == 'rejection' %}
        <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {% elif n.type == 'announcement' %}
        <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>
        {% else %}
        <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {% endif %}
    </div>
    <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 truncate">{{ n.title }}</p>
        <p class="text-xs text-gray-400 truncate">{{ n.message|truncatechars:60 }}</p>
        <p class="text-[10px] text-gray-300 mt-0.5">{{ n.created_at|date:"Y-m-d H:i" }}</p>
    </div>
</a>
{% empty %}
<p class="p-6 text-center text-sm text-gray-400">لا توجد إشعارات</p>
{% endfor %}
