<div x-data="{ show: false, student: {} }"
     x-show="show" x-cloak
     @open-student-profile.window="show = true; student = $event.detail"
     class="fixed inset-0 z-[100] flex items-center justify-center"
     @keydown.escape.window="show = false">
    <div class="absolute inset-0 bg-black/40" @click="show = false"></div>
    <div x-show="show"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         class="relative bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md z-10">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold text-gray-800" x-text="student.name || 'ملف الطالب'"></h3>
            <button @click="show = false" class="p-1 hover:bg-gray-100 rounded-lg">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="flex items-center gap-4 mb-6 p-4 bg-gray-50 rounded-xl">
            <div class="w-14 h-14 bg-primary-100 rounded-xl flex items-center justify-center">
                <span class="text-primary-700 font-bold text-xl" x-text="(student.name || '?')[0]"></span>
            </div>
            <div>
                <p class="font-bold text-gray-800" x-text="student.name"></p>
                <p class="text-sm text-gray-500" x-text="student.email"></p>
            </div>
        </div>
        <div class="space-y-3 text-sm">
            <div class="flex justify-between py-2 border-b border-gray-50">
                <span class="text-gray-500">الهاتف</span>
                <span class="font-medium text-gray-800" x-text="student.phone || '—'"></span>
            </div>
            <div class="flex justify-between py-2 border-b border-gray-50">
                <span class="text-gray-500">الجنس</span>
                <span class="font-medium text-gray-800" x-text="student.gender === 'male' ? 'ذكر' : student.gender === 'female' ? 'أنثى' : '—'"></span>
            </div>
            <div class="flex justify-between py-2 border-b border-gray-50">
                <span class="text-gray-500">الحالة</span>
                <span class="font-medium" x-text="student.is_active ? 'نشط' : 'غير نشط'" :class="student.is_active ? 'text-green-600' : 'text-gray-400'"></span>
            </div>
            <div class="flex justify-between py-2 border-b border-gray-50">
                <span class="text-gray-500">نسبة الحضور</span>
                <span class="font-medium text-gray-800" x-text="student.attendance_rate || '—'"></span>
            </div>
            <div class="flex justify-between py-2">
                <span class="text-gray-500">الحلقات المسجل بها</span>
                <span class="font-medium text-gray-800" x-text="student.circles || '—'"></span>
            </div>
        </div>
        <div class="mt-6 pt-4 border-t border-gray-100">
            <a :href="student.detail_url" class="block w-full text-center py-2.5 bg-gray-100 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-200 transition-colors">
                عرض الملف الكامل
            </a>
        </div>
    </div>
</div>
