{% comment %}المراسلات sidebar entry — shared across all roles. Unread badge is
driven by the same notifications store the chat service pings.{% endcomment %}
<a href="{% url 'chat:inbox' %}"
   :class="isActive('inbox') || isActive('conversation') ? 'nav-link-active' : ''"
   class="nav-link flex items-center gap-3 px-4 py-2.5 text-sm">
    <svg class="w-5 h-5 flex-shrink-0 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
    <span>المراسلات</span>
    {% if unread_messages %}
    <span class="mr-auto bg-brick-400 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">{{ unread_messages }}</span>
    {% endif %}
</a>
