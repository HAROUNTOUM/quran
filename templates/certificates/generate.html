{% extends 'dashboard/base.html' %}
{% load static %}
{% block title %}إصدار شهادة{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-800">إصدار شهادة جديدة</h1>
        <p class="text-sm text-gray-500 mt-1">اختر الطالب والقالب لإصدار شهادة</p>
    </div>

    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">الطالب</label>
            <select name="student" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
                <option value="">-- اختر الطالب --</option>
                {% for s in students %}
                <option value="{{ s.id }}">{{ s.full_name_ar }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">القالب</label>
            <select name="template" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
                <option value="">-- اختر القالب --</option>
                {% for t in templates %}
                <option value="{{ t.id }}">{{ t.name }} ({{ t.get_category_display }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">الحلقة (اختياري)</label>
            <input type="text" name="circle_name" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm" placeholder="اسم الحلقة">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">التفاصيل</label>
            <textarea name="details" rows="3" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm" placeholder="تفاصيل إضافية (اختياري)"></textarea>
        </div>

        <div class="flex items-center gap-3 pt-4">
            <button type="submit" class="px-6 py-2.5 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors text-sm font-medium">
                إصدار الشهادة
            </button>
            <a href="{% url 'certificates:list' %}" class="px-6 py-2.5 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 transition-colors text-sm font-medium">
                إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}
