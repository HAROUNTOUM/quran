<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: A4 landscape;
            margin: 2cm;
        }
        body {
            font-family: 'Noto Naskh Arabic', 'Traditional Arabic', serif;
            text-align: center;
            padding: 40px;
        }
        .header {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #1e3a8a;
        }
        .title {
            font-size: 36px;
            font-weight: bold;
            margin: 40px 0;
            color: #1d4ed8;
            border-bottom: 3px solid #1d4ed8;
            border-top: 3px solid #1d4ed8;
            padding: 15px 0;
        }
        .body-text {
            font-size: 22px;
            line-height: 2;
            margin: 40px 0;
            padding: 0 60px;
        }
        .student-name {
            font-size: 32px;
            font-weight: bold;
            color: #1e3a8a;
        }
        .details {
            font-size: 18px;
            margin: 20px 0;
            color: #374151;
        }
        .footer {
            font-size: 16px;
            margin-top: 60px;
            color: #6b7280;
        }
        .cert-number {
            font-size: 14px;
            color: #9ca3af;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">{{ header_text }}</div>
    <div class="title">شهادة تقدير</div>
    <div class="body-text">
        <p>تشهد إدارة الطبيب الحافظ بأن</p>
        <p class="student-name">{{ student_name }}</p>
        <p>{{ body }}</p>
    </div>
    {% if footer_text %}
    <div class="footer">{{ footer_text }}</div>
    {% endif %}
    <div class="cert-number">رقم الشهادة: {{ certificate_number }} — تاريخ الإصدار: {{ date }}</div>
</body>
</html>
