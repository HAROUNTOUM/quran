{% extends "emails/base_email.html" %}
{% block content %}
<h2 style="color:#1f2937;font-size:20px;margin:0 0 16px;">{{ subject }}</h2>
<div style="color:#4b5563;font-size:15px;line-height:1.9;margin:0 0 12px;white-space:pre-line;">{{ body }}</div>
<p style="color:#9ca3af;font-size:13px;line-height:1.7;margin:24px 0 0;border-top:1px solid #eef0f2;padding-top:16px;">
    هذه رسالة من إدارة منصة <strong>{{ site_name }}</strong>.
</p>
{% endblock %}
