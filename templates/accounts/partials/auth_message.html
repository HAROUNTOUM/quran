<div class="text-center py-8">
    <div class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center {% if type == 'success' %}bg-green-100{% else %}bg-red-100{% endif %}">
        {% if type == 'success' %}
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        {% else %}
            <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        {% endif %}
    </div>
    <p class="text-lg font-bold {% if type == 'success' %}text-green-700{% else %}text-red-700{% endif %} mb-2">
        {% if type == 'success' %}تم بنجاح{% else %}خطأ{% endif %}
    </p>
    <p class="text-gray-500 mb-6">{{ message }}</p>
    {% if show_login_link %}
        <a href="{% url 'accounts:login' %}" class="text-primary-600 font-bold hover:underline">الذهاب لتسجيل الدخول</a>
    {% endif %}
</div>
